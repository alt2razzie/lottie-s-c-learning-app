<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Learning Cat Academy 🐈</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg: #1a1625; --card: #2d2438; --text: #ffffff;
            --primary: #ff9a9e; --accent: #70a1ff; --secondary: #3b304d;
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --text: #2d2438;
            --secondary: #e4e6eb;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: var(--text); 
            transition: 0.3s; margin: 0; padding: 20px; 
        }

        .container { max-width: 500px; margin: auto; }

        /* Theme Toggle */
        .theme-btn {
            position: fixed; top: 20px; right: 20px;
            background: var(--primary); border: none; padding: 10px; 
            border-radius: 50%; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Profile & XP Section */
        .profile-section { text-align: center; margin-bottom: 25px; }
        .avatar { width: 80px; margin-bottom: 10px; }
        .bubble { 
            background: var(--secondary); padding: 8px 20px; 
            border-radius: 20px; display: inline-block; font-size: 14px;
            margin-bottom: 15px;
        }
        .xp-container { width: 100%; background: var(--secondary); border-radius: 10px; height: 10px; position: relative; }
        .xp-fill { 
            background: linear-gradient(90deg, #ff9a9e, #fad0c4); 
            height: 100%; width: 35%; border-radius: 10px; transition: 0.5s; 
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); 
        }
        .stat-card b { font-size: 18px; color: var(--primary); }

        /* Lesson Categories */
        .category-title { margin: 25px 0 15px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .lesson-card {
            background: var(--card); padding: 15px; border-radius: 20px;
            margin-bottom: 12px; display: flex; align-items: center; 
            justify-content: space-between; cursor: pointer; transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .lesson-card:hover { transform: scale(1.02); background: var(--secondary); }
        .lesson-info { display: flex; align-items: center; gap: 15px; }
        .icon-box { 
            font-size: 24px; background: rgba(255,154,158,0.1); 
            padding: 10px; border-radius: 15px; 
        }

        /* AI Content Area */
        #lesson-display { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            margin-top: 20px; display: none; border: 2px solid var(--primary);
            color: var(--text);
        }
        pre { border-radius: 10px; padding: 15px !important; overflow-x: auto; }
        
        .loading { text-align: center; display: none; color: var(--primary); font-weight: bold; }
    </style>
</head>

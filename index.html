<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Learning Platform | AI Powered</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="mascot">🐱</div>
            <div class="greeting">Let's write some C code! 💻</div>
            
            <div class="xp-bar">
                <div class="xp-badge">Lv.1</div>
                <div class="xp-title">Kitten Coder</div>
                <div class="xp-score">0/100 XP</div>
            </div>
        </header>

        <main>
            <div id="home-view">
                <h2 class="section-title">📚 Lesson Categories</h2>
                <div id="categories-container" class="categories-grid">
                    </div>
            </div>

            <div id="lesson-view" style="display: none;">
                <button onclick="goBack()" class="greeting" style="cursor: pointer; margin-bottom: 1.5rem; width: auto; align-self: flex-start;">
                    ← Back to Categories
                </button>
                
                <div id="lesson-content" class="card" style="display: block; padding: 1.5rem; min-height: 200px;">
                    </div>
            </div>
        </main>

        <footer style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.75rem;">
            🐾 Made with love for curious cats 🐾
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

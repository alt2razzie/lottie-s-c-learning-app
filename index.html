<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Learning Cat Academy 🐈</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { text-align: center; color: #00d2ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.3s; border: 1px solid #0f3460; }
        .card:hover { background: #0f3460; transform: translateY(-5px); border-color: #00d2ff; }
        #lesson-box { background: #ffffff; color: #333; padding: 30px; border-radius: 15px; min-height: 200px; line-height: 1.6; display: none; }
        .loading { text-align: center; font-style: italic; color: #00d2ff; display: none; }
        code { font-family: 'Consolas', monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐈 C-Learning Academy</h1>
        <p style="text-align:center">Click a topic to start your paw-some journey!</p>

        <div class="grid">
            <div class="card" onclick="getLesson('C Basics')">🏁 Basics</div>
            <div class="card" onclick="getLesson('Variables & Data Types')">📦 Variables</div>
            <div class="card" onclick="getLesson('If-Else Statements')">⚖️ Logic</div>
            <div class="card" onclick="getLesson('Loops in C')">🔄 Loops</div>
            <div class="card" onclick="getLesson('Functions')">🛠️ Functions</div>
            <div class="card" onclick="getLesson('Pointers')">📍 Pointers</div>
            <div class="card" onclick="getLesson('Structs')">🏗️ Structs</div>
            <div class="card" onclick="getLesson('Memory Allocation')">💾 Memory</div>
        </div>

        <div id="loading" class="loading">Cat is typing... 🐾</div>
        <div id="lesson-box"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
